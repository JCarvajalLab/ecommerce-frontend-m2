<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CDN Boostrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

    <!-- CDN Boostrap Icon -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <!-- CDN icons Cloudflare -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet" />

    <!-- CSS  -->
    <link rel="stylesheet" href="../assets/css/style.css" />
    <title>Ecommerce</title>
</head>

<body data-bs-theme="dark">
    <!-- HEADER  -->
    <header>
        <!-- navBar desde el componente -->
        <div id="navbar">
            <!-- "assets/components/navbar.html" -->
        </div>
    </header>
    <!-- CONTENIDO DE LA PAGINA -->
    <main>
        <div class="container py-5">
            <!-- JS inyectará el contenido aquí -->
            <div id="detalle-producto">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3 text-muted">Cargando producto...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL CARRITO -->
    <div class="modal fade" id="modalCarrito" tabindex="-1" aria-labelledby="modalCarritoLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalCarritoLabel">
                        <i class="bi bi-cart-check me-2 text-success"></i>Producto
                        agregado
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" id="mensaje-modal"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                        Seguir comprando
                    </button>
                    <a href="/pages/carrito.html" class="btn btn-success">
                        <i class="bi bi-cart me-1"></i>Ver carrito
                    </a>
                </div>
            </div>
        </div>
    </div>
    <!-- se modifica codigo por githubpages
<a href="/pages/carrito.html" class="btn btn-success">
<i class="bi bi-cart me-1"></i>Ver carrito
</a> -->

    <hr class="featurette-divider" />
    <!-- FOOTER desde el componente -->
    <footer class="mt-auto">
        <div id="footer">
            <!-- "assets/components/footer.html" -->
        </div>
    </footer>
    <!-- Script JS Boostrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- script de JS local -->
    <script src="../assets/js/productos.js"></script>
    <script src="../assets/js/carrito.js"></script>
    <script src="../assets/js/app.js"></script>
</body>

</html>
