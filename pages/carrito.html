<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- CDN Boostrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />

  <!-- CDN Boostrap Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

  <!-- CSS  -->
  <link rel="stylesheet" href="/Assets/css/style.css" />
  <title>Ecommerce</title>
</head>

<body data-bs-theme="dark">
  <!-- HEADER  -->
  <header>
    <!-- navBar desde el componente -->
    <div id="navbar">
      <!-- "assets/components/navbar.html" -->
    </div>
  </header>
  <!-- CONTENIDO DE LA PAGINA -->
  <main>
    <div class="container mt-5">
      <h2 class="mb-4">Carrito de compras</h2>
      <div class="row g-4">
        <!-- LISTA DE PRODUCTOS DEL CARRITO -->
        <div class="col-lg-8">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0">Productos en el carrito</h4>
            <span class="text-muted">
              <span id="cantidad-productos">0</span> productos
            </span>
          </div>

          <!-- AQUÍ JS INSERTARÁ LOS PRODUCTOS -->
          <div id="contenedor-carrito" class="d-flex flex-column gap-3"></div>
        </div>

        <!-- RESUMEN DEL PEDIDO -->
        <div class="col-lg-4">
          <div class="summary-card p-4 shadow-sm">
            <h5 class="mb-4">Resumen del pedido</h5>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Subtotal</span>
              <span id="subtotal">$0</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Descuento</span>
              <span class="text-success">$0</span>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <span class="text-muted">Envío</span>
              <span>$0</span>
            </div>
            <hr />
            <div class="d-flex justify-content-between mb-4">
              <span class="fw-bold">Total</span>
              <span class="fw-bold" id="total">$0</span>
            </div>

            <!-- CUPÓN -->
            <div class="mb-4">
              <div class="input-group">
                <input type="text" class="form-control" placeholder="Código de descuento" />
                <button class="btn btn-outline-secondary">Aplicar</button>
              </div>
            </div>
            <button class="btn btn-primary w-100 mb-3">
              Proceder al pago
            </button>
            <div class="d-flex justify-content-center gap-2">
              <i class="bi bi-shield-check text-success"></i>
              <small class="text-muted"> Pago seguro </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <hr class="featurette-divider" />
  <!-- FOOTER desde el componente -->
  <footer class="mt-auto">
    <div id="footer">
      <!-- "assets/components/footer.html" -->
    </div>
  </footer>
  <!-- Script JS Boostrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <!-- script de jQuery -->
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <!-- script de JS local -->
  <script src="/assets/js/productos.js"></script>
  <script src="/assets/js/carrito.js"></script>
  <script src="/assets/js/app.js"></script>
</body>

</html>
